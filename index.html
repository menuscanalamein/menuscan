<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو المطعم</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f7f4ed;
  color:#1a1a1a;
}

.header{
  text-align:center;
  padding:40px 20px 10px;
}

.header h1{
  margin:0;
  font-size:32px;
}

.header p{
  color:#666;
  margin-top:8px;
}

.menu{
  max-width:500px;
  margin:20px auto;
  padding:0 15px;
}

.section{
  margin-bottom:25px;
  border:1px solid #e9e4db;
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

.section-title{
  background:#f2eee6;
  padding:12px;
  font-weight:bold;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-top:1px solid #eee;
}

.price{
  font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
  <h1>منيو المطعم</h1>
  <p>تجربة بسيطة بروح راقية</p>
</div>

<div class="menu">

  <div class="section">
    <div class="section-title">الأطباق الرئيسية</div>

    <div class="item">
      <span>برجر لحم</span>
      <span class="price">120 جنيه</span>
    </div>

    <div class="item">
      <span>بيتزا إيطالية</span>
      <span class="price">150 جنيه</span>
    </div>

  </div>

</div>

</body>
</html>
