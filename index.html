<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع القائمة</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    منيو المطعم
</header>

<div class="container">

    <div class="card">
        <h3>برجر لحم</h3>
        <p>وجبة برجر لذيذة مع بطاطس</p>
        <p class="price">120 جنيه</p>
    </div>

    <div class="card">
        <h3>بيتزا</h3>
        <p>بيتزا إيطالية حجم وسط</p>
        <p class="price">150 جنيه</p>
    </div>

</div>

</body>
</html>
