<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو المطعم</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f7f4ed; /* نفس روح Lovable */
  color:#1c1c1c;
}

.header{
  text-align:center;
  padding:30px 15px;
  font-size:28px;
  font-weight:bold;
}

.card{
  width:90%;
  max-width:500px;
  margin:20px auto;
  background:#f7f4ed;
  border:1px solid #eceae4;
  border-radius:16px;
  padding:15px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:12px 10px;
  border-bottom:1px solid #eceae4;
}

.item:last-child{
  border-bottom:none;
}

.price{
  font-weight:bold;
}

.sub{
  text-align:center;
  color:#5f5f5d;
  font-size:14px;
  margin-top:-10px;
}
</style>

</head>

<body>

<div class="header">منيو المطعم</div>
<div class="sub">نكهة بسيطة بتجربة راقية</div>

<div class="card">

  <div class="item">
    <span>برجر لحم</span>
    <span class="price">120 جنيه</span>
  </div>

  <div class="item">
    <span>بيتزا إيطالية</span>
    <span class="price">150 جنيه</span>
  </div>

</div>

</body>
</html>
